<!DOCTYPE html>
<html>
<body style="font-family:Arial,sans-serif;background:#f6f6f6;padding:24px">
  <div style="max-width:420px;margin:0 auto;background:#fff;border-radius:12px;padding:28px">
    <h2 style="margin:0 0 12px;color:#111">Вход в Дельник</h2>
    <p style="color:#444;margin:0 0 16px">Ваш код для входа:</p>
    <div style="font-size:32px;font-weight:bold;letter-spacing:8px;color:#111;text-align:center;padding:16px;background:#f0f4ff;border-radius:8px">{{ .Token }}</div>
    <p style="color:#666;margin:16px 0 0;font-size:14px">Введите этот код в приложении. Код действует ограниченное время.</p>
    <p style="color:#999;margin:12px 0 0;font-size:12px">Если вы не запрашивали вход, просто проигнорируйте это письмо.</p>
  </div>
</body>
</html>
